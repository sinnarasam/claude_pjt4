<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키보드 입력 테스트</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    user-select: none;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }

  .display {
    width: 100%;
    max-width: 920px;
    min-height: 80px;
    background: #fafafa;
    border: 1px solid #ececec;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    font-size: 18px;
    line-height: 1.5;
    word-break: break-all;
    color: #333;
  }

  .display:empty::before {
    content: "키를 눌러보세요...";
    color: #c0c0c0;
  }

  .info {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
    color: #999;
  }

  .clear-btn {
    background: none;
    border: 1px solid #e0e0e0;
    color: #666;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    background: #f5f5f5;
    border-color: #ccc;
  }

  .keyboard {
    background: #fafafa;
    border: 1px solid #ececec;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .key {
    min-width: 44px;
    height: 44px;
    background: #ffffff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.08s ease;
    padding: 0 10px;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
  }

  .key:hover {
    background: #f5f5f5;
  }

  .key.active {
    background: #1a1a1a;
    color: #ffffff;
    border-color: #1a1a1a;
    transform: translateY(1px);
    box-shadow: none;
  }

  .key.wide-1 { min-width: 60px; }
  .key.wide-2 { min-width: 72px; }
  .key.wide-3 { min-width: 88px; }
  .key.wide-4 { min-width: 100px; }
  .key.space  { min-width: 320px; }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #bbb;
  }

  @media (max-width: 720px) {
    .key {
      min-width: 32px;
      height: 36px;
      font-size: 11px;
      padding: 0 6px;
    }
    .key.wide-1 { min-width: 44px; }
    .key.wide-2 { min-width: 54px; }
    .key.wide-3 { min-width: 66px; }
    .key.wide-4 { min-width: 76px; }
    .key.space  { min-width: 200px; }
  }
</style>
</head>
<body>

<h1>키보드 입력 테스트</h1>
<p class="subtitle">물리 키보드를 누르거나 화면의 키를 클릭해보세요.</p>

<div class="display" id="display"></div>

<div class="info">
  <span id="lastKey">마지막 키: -</span>
  <button class="clear-btn" id="clearBtn">초기화</button>
</div>

<div class="keyboard" id="keyboard">
  <div class="row">
    <div class="key" data-key="`">`</div>
    <div class="key" data-key="1">1</div>
    <div class="key" data-key="2">2</div>
    <div class="key" data-key="3">3</div>
    <div class="key" data-key="4">4</div>
    <div class="key" data-key="5">5</div>
    <div class="key" data-key="6">6</div>
    <div class="key" data-key="7">7</div>
    <div class="key" data-key="8">8</div>
    <div class="key" data-key="9">9</div>
    <div class="key" data-key="0">0</div>
    <div class="key" data-key="-">-</div>
    <div class="key" data-key="=">=</div>
    <div class="key wide-3" data-key="Backspace">Backspace</div>
  </div>
  <div class="row">
    <div class="key wide-2" data-key="Tab">Tab</div>
    <div class="key" data-key="q">Q</div>
    <div class="key" data-key="w">W</div>
    <div class="key" data-key="e">E</div>
    <div class="key" data-key="r">R</div>
    <div class="key" data-key="t">T</div>
    <div class="key" data-key="y">Y</div>
    <div class="key" data-key="u">U</div>
    <div class="key" data-key="i">I</div>
    <div class="key" data-key="o">O</div>
    <div class="key" data-key="p">P</div>
    <div class="key" data-key="[">[</div>
    <div class="key" data-key="]">]</div>
    <div class="key wide-1" data-key="\">\</div>
  </div>
  <div class="row">
    <div class="key wide-3" data-key="CapsLock">Caps</div>
    <div class="key" data-key="a">A</div>
    <div class="key" data-key="s">S</div>
    <div class="key" data-key="d">D</div>
    <div class="key" data-key="f">F</div>
    <div class="key" data-key="g">G</div>
    <div class="key" data-key="h">H</div>
    <div class="key" data-key="j">J</div>
    <div class="key" data-key="k">K</div>
    <div class="key" data-key="l">L</div>
    <div class="key" data-key=";">;</div>
    <div class="key" data-key="'">'</div>
    <div class="key wide-3" data-key="Enter">Enter</div>
  </div>
  <div class="row">
    <div class="key wide-4" data-key="Shift" data-side="left">Shift</div>
    <div class="key" data-key="z">Z</div>
    <div class="key" data-key="x">X</div>
    <div class="key" data-key="c">C</div>
    <div class="key" data-key="v">V</div>
    <div class="key" data-key="b">B</div>
    <div class="key" data-key="n">N</div>
    <div class="key" data-key="m">M</div>
    <div class="key" data-key=",">,</div>
    <div class="key" data-key=".">.</div>
    <div class="key" data-key="/">/</div>
    <div class="key wide-4" data-key="Shift" data-side="right">Shift</div>
  </div>
  <div class="row">
    <div class="key wide-2" data-key="Control">Ctrl</div>
    <div class="key wide-1" data-key="Meta">Win</div>
    <div class="key wide-1" data-key="Alt">Alt</div>
    <div class="key space" data-key=" ">Space</div>
    <div class="key wide-1" data-key="Alt">Alt</div>
    <div class="key" data-key="ArrowLeft">←</div>
    <div class="key" data-key="ArrowUp">↑</div>
    <div class="key" data-key="ArrowDown">↓</div>
    <div class="key" data-key="ArrowRight">→</div>
  </div>
</div>

<p class="footer">© Keyboard Tester</p>

<script>
  const display = document.getElementById('display');
  const lastKeyEl = document.getElementById('lastKey');
  const clearBtn = document.getElementById('clearBtn');
  const keyboard = document.getElementById('keyboard');
  const allKeys = document.querySelectorAll('.key');

  function findKeyElement(key) {
    const lower = key.length === 1 ? key.toLowerCase() : key;
    return Array.from(allKeys).find(el => el.dataset.key === lower);
  }

  function activate(el) {
    if (!el) return;
    el.classList.add('active');
  }

  function deactivate(el) {
    if (!el) return;
    el.classList.remove('active');
  }

  function appendToDisplay(key) {
    if (key === 'Backspace') {
      display.textContent = display.textContent.slice(0, -1);
    } else if (key === 'Enter') {
      display.textContent += '\n';
    } else if (key === 'Tab') {
      display.textContent += '\t';
    } else if (key.length === 1) {
      display.textContent += key;
    }
  }

  function updateLastKey(key) {
    const display = key === ' ' ? 'Space' : key;
    lastKeyEl.textContent = `마지막 키: ${display}`;
  }

  document.addEventListener('keydown', (e) => {
    const el = findKeyElement(e.key);
    activate(el);
    appendToDisplay(e.key);
    updateLastKey(e.key);
    if (['Tab', 'Backspace', ' ', "'", '/'].includes(e.key)) {
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', (e) => {
    const el = findKeyElement(e.key);
    deactivate(el);
  });

  allKeys.forEach(keyEl => {
    keyEl.addEventListener('mousedown', () => {
      const key = keyEl.dataset.key;
      activate(keyEl);
      appendToDisplay(key);
      updateLastKey(key);
    });
    keyEl.addEventListener('mouseup', () => deactivate(keyEl));
    keyEl.addEventListener('mouseleave', () => deactivate(keyEl));
  });

  clearBtn.addEventListener('click', () => {
    display.textContent = '';
    lastKeyEl.textContent = '마지막 키: -';
  });
</script>

</body>
</html>
