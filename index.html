<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키보드 입력 테스트</title>
<script>
  // FOUC 방지: 스타일 적용 전에 테마 결정
  (function () {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #888888;
    --text-dim: #bbbbbb;
    --panel-bg: #fafafa;
    --panel-border: #ececec;
    --key-bg: #ffffff;
    --key-border: #e5e5e5;
    --key-text: #333333;
    --key-hover: #f5f5f5;
    --key-shadow: rgba(0, 0, 0, 0.04);
    --key-active-bg: #1a1a1a;
    --key-active-text: #ffffff;
    --btn-border: #e0e0e0;
    --btn-text: #666666;
    --btn-hover-bg: #f5f5f5;
    --btn-hover-border: #cccccc;
    --placeholder: #c0c0c0;
  }

  [data-theme="dark"] {
    --bg: #141414;
    --text: #e8e8e8;
    --text-muted: #888888;
    --text-dim: #555555;
    --panel-bg: #1c1c1c;
    --panel-border: #2a2a2a;
    --key-bg: #222222;
    --key-border: #2f2f2f;
    --key-text: #e8e8e8;
    --key-hover: #2a2a2a;
    --key-shadow: rgba(0, 0, 0, 0.3);
    --key-active-bg: #f5f5f5;
    --key-active-text: #1a1a1a;
    --btn-border: #2f2f2f;
    --btn-text: #999999;
    --btn-hover-bg: #252525;
    --btn-hover-border: #444444;
    --placeholder: #444444;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    user-select: none;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    color: var(--key-text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    box-shadow: 0 1px 2px var(--key-shadow);
  }

  .theme-toggle:hover {
    background: var(--key-hover);
    transform: scale(1.05);
  }

  .theme-toggle svg {
    width: 18px;
    height: 18px;
  }

  .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: block; }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .display {
    width: 100%;
    max-width: 920px;
    min-height: 80px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    font-size: 18px;
    line-height: 1.5;
    word-break: break-all;
    color: var(--text);
    transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

  .display:empty::before {
    content: "키를 눌러보세요...";
    color: var(--placeholder);
  }

  .info {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--btn-border);
    color: var(--btn-text);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .clear-btn:hover {
    background: var(--btn-hover-bg);
    border-color: var(--btn-hover-border);
  }

  .keyboard {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .key {
    min-width: 44px;
    height: 44px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--key-text);
    cursor: pointer;
    transition: background-color 0.08s ease, border-color 0.08s ease, color 0.08s ease, transform 0.08s ease;
    padding: 0 10px;
    box-shadow: 0 1px 0 var(--key-shadow);
  }

  .key:hover {
    background: var(--key-hover);
  }

  .key.active {
    background: var(--key-active-bg);
    color: var(--key-active-text);
    border-color: var(--key-active-bg);
    transform: translateY(1px);
    box-shadow: none;
  }

  .key.wide-1 { min-width: 60px; }
  .key.wide-2 { min-width: 72px; }
  .key.wide-3 { min-width: 88px; }
  .key.wide-4 { min-width: 100px; }
  .key.space  { min-width: 320px; }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  @media (max-width: 720px) {
    .key {
      min-width: 32px;
      height: 36px;
      font-size: 11px;
      padding: 0 6px;
    }
    .key.wide-1 { min-width: 44px; }
    .key.wide-2 { min-width: 54px; }
    .key.wide-3 { min-width: 66px; }
    .key.wide-4 { min-width: 76px; }
    .key.space  { min-width: 200px; }
    .theme-toggle {
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
    }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="테마 전환" title="테마 전환">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
  </svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</button>

<h1>키보드 입력 테스트</h1>
<p class="subtitle">물리 키보드를 누르거나 화면의 키를 클릭해보세요.</p>

<div class="display" id="display"></div>

<div class="info">
  <span id="lastKey">마지막 키: -</span>
  <button class="clear-btn" id="clearBtn">초기화</button>
</div>

<div class="keyboard" id="keyboard">
  <div class="row">
    <div class="key" data-key="`">`</div>
    <div class="key" data-key="1">1</div>
    <div class="key" data-key="2">2</div>
    <div class="key" data-key="3">3</div>
    <div class="key" data-key="4">4</div>
    <div class="key" data-key="5">5</div>
    <div class="key" data-key="6">6</div>
    <div class="key" data-key="7">7</div>
    <div class="key" data-key="8">8</div>
    <div class="key" data-key="9">9</div>
    <div class="key" data-key="0">0</div>
    <div class="key" data-key="-">-</div>
    <div class="key" data-key="=">=</div>
    <div class="key wide-3" data-key="Backspace">Backspace</div>
  </div>
  <div class="row">
    <div class="key wide-2" data-key="Tab">Tab</div>
    <div class="key" data-key="q">Q</div>
    <div class="key" data-key="w">W</div>
    <div class="key" data-key="e">E</div>
    <div class="key" data-key="r">R</div>
    <div class="key" data-key="t">T</div>
    <div class="key" data-key="y">Y</div>
    <div class="key" data-key="u">U</div>
    <div class="key" data-key="i">I</div>
    <div class="key" data-key="o">O</div>
    <div class="key" data-key="p">P</div>
    <div class="key" data-key="[">[</div>
    <div class="key" data-key="]">]</div>
    <div class="key wide-1" data-key="\">\</div>
  </div>
  <div class="row">
    <div class="key wide-3" data-key="CapsLock">Caps</div>
    <div class="key" data-key="a">A</div>
    <div class="key" data-key="s">S</div>
    <div class="key" data-key="d">D</div>
    <div class="key" data-key="f">F</div>
    <div class="key" data-key="g">G</div>
    <div class="key" data-key="h">H</div>
    <div class="key" data-key="j">J</div>
    <div class="key" data-key="k">K</div>
    <div class="key" data-key="l">L</div>
    <div class="key" data-key=";">;</div>
    <div class="key" data-key="'">'</div>
    <div class="key wide-3" data-key="Enter">Enter</div>
  </div>
  <div class="row">
    <div class="key wide-4" data-key="Shift" data-side="left">Shift</div>
    <div class="key" data-key="z">Z</div>
    <div class="key" data-key="x">X</div>
    <div class="key" data-key="c">C</div>
    <div class="key" data-key="v">V</div>
    <div class="key" data-key="b">B</div>
    <div class="key" data-key="n">N</div>
    <div class="key" data-key="m">M</div>
    <div class="key" data-key=",">,</div>
    <div class="key" data-key=".">.</div>
    <div class="key" data-key="/">/</div>
    <div class="key wide-4" data-key="Shift" data-side="right">Shift</div>
  </div>
  <div class="row">
    <div class="key wide-2" data-key="Control">Ctrl</div>
    <div class="key wide-1" data-key="Meta">Win</div>
    <div class="key wide-1" data-key="Alt">Alt</div>
    <div class="key space" data-key=" ">Space</div>
    <div class="key wide-1" data-key="Alt">Alt</div>
    <div class="key" data-key="ArrowLeft">←</div>
    <div class="key" data-key="ArrowUp">↑</div>
    <div class="key" data-key="ArrowDown">↓</div>
    <div class="key" data-key="ArrowRight">→</div>
  </div>
</div>

<p class="footer">© Keyboard Tester</p>

<script>
  const display = document.getElementById('display');
  const lastKeyEl = document.getElementById('lastKey');
  const clearBtn = document.getElementById('clearBtn');
  const themeToggle = document.getElementById('themeToggle');
  const allKeys = document.querySelectorAll('.key');

  function findKeyElement(key) {
    const lower = key.length === 1 ? key.toLowerCase() : key;
    return Array.from(allKeys).find(el => el.dataset.key === lower);
  }

  function activate(el) {
    if (!el) return;
    el.classList.add('active');
  }

  function deactivate(el) {
    if (!el) return;
    el.classList.remove('active');
  }

  function appendToDisplay(key) {
    if (key === 'Backspace') {
      display.textContent = display.textContent.slice(0, -1);
    } else if (key === 'Enter') {
      display.textContent += '\n';
    } else if (key === 'Tab') {
      display.textContent += '\t';
    } else if (key.length === 1) {
      display.textContent += key;
    }
  }

  function updateLastKey(key) {
    const label = key === ' ' ? 'Space' : key;
    lastKeyEl.textContent = `마지막 키: ${label}`;
  }

  document.addEventListener('keydown', (e) => {
    const el = findKeyElement(e.key);
    activate(el);
    appendToDisplay(e.key);
    updateLastKey(e.key);
    if (['Tab', 'Backspace', ' ', "'", '/'].includes(e.key)) {
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', (e) => {
    const el = findKeyElement(e.key);
    deactivate(el);
  });

  allKeys.forEach(keyEl => {
    keyEl.addEventListener('mousedown', () => {
      const key = keyEl.dataset.key;
      activate(keyEl);
      appendToDisplay(key);
      updateLastKey(key);
    });
    keyEl.addEventListener('mouseup', () => deactivate(keyEl));
    keyEl.addEventListener('mouseleave', () => deactivate(keyEl));
  });

  clearBtn.addEventListener('click', () => {
    display.textContent = '';
    lastKeyEl.textContent = '마지막 키: -';
  });

  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // OS 테마 변경 감지 (사용자가 수동 선택하지 않은 경우에만 반응)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    if (!localStorage.getItem('theme')) {
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
    }
  });
</script>

</body>
</html>
